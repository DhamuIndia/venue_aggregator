spring:
  application:
    name: venue-aggregator-backend
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/venue_aggregator}
    username: ${DATABASE_USERNAME:venue_app}
    password: ${DATABASE_PASSWORD:venue_app_password}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  secret: ${JWT_SECRET:staminal-super-secret-key-for-venue-app-2026}
  access-token-expiration-ms: ${JWT_ACCESS_TOKEN_EXPIRATION_MS:900000}
  refresh-token-expiration-ms: ${JWT_REFRESH_TOKEN_EXPIRATION_MS:604800000}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3001,http://localhost:3000}
  storage:
    provider: ${STORAGE_PROVIDER:s3}
    s3:
      endpoint: ${S3_ENDPOINT:http://localhost:9000}
      presign-endpoint: ${S3_PRESIGN_ENDPOINT:http://localhost:9000}
      region: ${S3_REGION:us-east-1}
      bucket: ${S3_BUCKET:venue-media}
      access-key: ${S3_ACCESS_KEY:venue_minio}
      secret-key: ${S3_SECRET_KEY:venue_minio_password}
      path-style-access: ${S3_PATH_STYLE_ACCESS:true}
      public-base-url: ${S3_PUBLIC_BASE_URL:http://localhost:9000/venue-media}
    media:
      max-upload-size-bytes: ${MEDIA_MAX_UPLOAD_SIZE_BYTES:10485760}

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

springdoc:
  swagger-ui:
    path: /docs

spring:
  application:
    name: venue-aggregator-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/venue-aggregator
    username: postgres
    password: staminal
jwt:
  secret: staminal-super-secret-key-for-venue-app-2026
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

springdoc:
  swagger-ui:
    path: /docs

name: bookvenuemart

services:
  reverse-proxy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
      - minio
    environment:
      ACME_EMAIL: ${ACME_EMAIL}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile.bookvenuemart:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - internal

  frontend:
    build:
      context: ../../apps/frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
        NEXT_PUBLIC_AUTH_MODE: api
        NEXT_PUBLIC_HALLS_MODE: api
        NEXT_PUBLIC_ENQUIRIES_MODE: api
        NEXT_PUBLIC_AVAILABILITY_MODE: api
        NEXT_PUBLIC_OWNER_LISTINGS_MODE: api
        NEXT_PUBLIC_OWNER_ONBOARDING_MODE: api
        NEXT_PUBLIC_OWNER_MEDIA_MODE: api
        NEXT_PUBLIC_OWNER_REVIEWS_MODE: api
        NEXT_PUBLIC_CUSTOMER_REVIEWS_MODE: api
        NEXT_PUBLIC_CUSTOMER_SAVED_HALLS_MODE: api
        NEXT_PUBLIC_BOOKINGS_MODE: api
        NEXT_PUBLIC_BOOKING_PAYMENTS_MODE: api
        NEXT_PUBLIC_NOTIFICATIONS_MODE: api
        NEXT_PUBLIC_ANALYTICS_MODE: api
        NEXT_PUBLIC_VENDOR_LEADS_MODE: api
        NEXT_PUBLIC_ADMIN_MODE: api
        NEXT_PUBLIC_VENDORS_MODE: api
        NEXT_PUBLIC_VENDOR_PROFILE_MODE: api
        NEXT_PUBLIC_VENDOR_SUBSCRIPTION_MODE: api
        NEXT_PUBLIC_VENDOR_PACKAGES_MODE: api
        NEXT_PUBLIC_VENDOR_MEDIA_MODE: api
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "3000"
    networks:
      - internal

  backend:
    build:
      context: ../../apps/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      DATABASE_USERNAME: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      SERVER_PORT: 8080
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TOKEN_EXPIRATION_MS: ${JWT_ACCESS_TOKEN_EXPIRATION_MS}
      JWT_REFRESH_TOKEN_EXPIRATION_MS: ${JWT_REFRESH_TOKEN_EXPIRATION_MS}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      STORAGE_PROVIDER: s3
      S3_ENDPOINT: http://minio:9000
      S3_PRESIGN_ENDPOINT: https://${MEDIA_DOMAIN}
      S3_REGION: us-east-1
      S3_BUCKET: ${MINIO_BUCKET}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      S3_PATH_STYLE_ACCESS: "true"
      S3_PUBLIC_BASE_URL: https://${MEDIA_DOMAIN}/${MINIO_BUCKET}
      MEDIA_MAX_UPLOAD_SIZE_BYTES: ${MEDIA_MAX_UPLOAD_SIZE_BYTES}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    expose:
      - "8080"
    networks:
      - internal

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  minio:
    image: minio/minio:RELEASE.2025-02-03T21-03-04Z
    command: server /data --console-address ":9001"
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    networks:
      - internal

  minio-init:
    image: minio/mc:latest
    restart: "no"
    depends_on:
      - minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
    volumes:
      - ./minio-cors.json:/tmp/minio-cors.json:ro
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD; do
        echo 'Waiting for MinIO...';
        sleep 2;
      done;
      mc mb --ignore-existing local/$$MINIO_BUCKET;
      mc anonymous set download local/$$MINIO_BUCKET;
      mc cors set local/$$MINIO_BUCKET /tmp/minio-cors.json;
      "
    networks:
      - internal

networks:
  internal:

volumes:
  caddy-data:
  caddy-config:
  postgres-data:
  minio-data:
